name: Main Branch CD (Production Build)

on:
  push:
    branches:
      - main  # Only runs on the main branch

jobs:
  quality-and-build:
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:15
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: taskmanager_db
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Code Quality (Ruff & Mypy)
        run: |
          ruff check .
          mypy .

      - name: Run Integration Tests (Pytest)
        env:
          DATABASE_URL: postgresql://postgres:postgres@localhost:5432/taskmanager_db
          SECRET_KEY: test_secret_key_prodtuction
          PYTHONPATH: ${{ github.workspace }}
        run: pytest tests/

      - name: Verify Docker Production Build
        run: |
          docker build -t fast-api-prod:latest .
          echo "Production image built successfully!"
