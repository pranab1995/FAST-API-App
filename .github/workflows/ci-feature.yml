name: Feature Branch CI

on:
  push:
    branches-ignore:
      - main  # We'll create a different one for main later
  pull_request:
    branches-ignore:
      - main

jobs:
  test:
    runs-on: ubuntu-latest

    services:
      # We spin up a real Postgres for integration tests
      postgres:
        image: postgres:15
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: taskmanager_db
        ports:
          - 5432:5432
        # Wait until postgres is ready
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip' # caching pip dependencies for faster builds

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run Ruff (Linting)
        run: ruff check .

      - name: Run Mypy (Types)
        run: mypy .

      - name: Run Tests (Pytest)
        env:
          DATABASE_URL: postgresql://postgres:postgres@localhost:5432/taskmanager_db
          SECRET_KEY: test_secret_key_change_in_production
          PYTHONPATH: ${{ github.workspace }}
        run: pytest tests/
