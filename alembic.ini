# A generic, single database configuration.
# =============================================================================
# alembic.ini
#
# PURPOSE:
#   Configuration file for Alembic (the SQLAlchemy migration tool).
#
# DRF EQUIVALENT:
#   This is equivalent to Django's migration system configuration.
#   In Django, migrations are auto-managed per-app. Alembic is a standalone
#   tool that you configure explicitly — more control, slightly more setup.
#
# KEY COMMANDS:
#   alembic revision --autogenerate -m "create users and tasks tables"
#     → Compares your SQLAlchemy models against the DB and generates a script
#       (equivalent to: python manage.py makemigrations)
#
#   alembic upgrade head
#     → Applies all pending migrations to the DB
#       (equivalent to: python manage.py migrate)
#
#   alembic downgrade -1
#     → Rolls back the last migration
#       (Django has no built-in rollback — Alembic wins here)
#
#   alembic history
#     → Shows migration history
#       (equivalent to: python manage.py showmigrations)
# =============================================================================

[alembic]
# Path to migration scripts directory
script_location = alembic

# Template file for new migrations
file_template = %%(year)d%%(month).2d%%(day).2d_%%(hour).2d%%(minute).2d_%%(rev)s_%%(slug)s

# Timezone for migration timestamps
timezone = UTC

# The database URL is read in env.py from the app settings
# Do NOT hardcode credentials here — env.py reads from .env via Settings
# sqlalchemy.url = postgresql://user:pass@localhost/dbname  ← example (not used)

[post_write_hooks]
# Optional: run black formatter on generated migration files
# hooks = black
# black.type = console_scripts
# black.entrypoint = black
# black.options = -l 88 REVISION_SCRIPT_FILENAME

[loggers]
keys = root,sqlalchemy,alembic

[handlers]
keys = console

[formatters]
keys = generic

[logger_root]
level = WARN
handlers = console
qualname =

[logger_sqlalchemy]
level = WARN
handlers =
qualname = sqlalchemy.engine

[logger_alembic]
level = INFO
handlers =
qualname = alembic

[handler_console]
class = StreamHandler
args = (sys.stderr,)
level = NOTSET
formatter = generic

[formatter_generic]
format = %(levelname)-5.5s [%(name)s] %(message)s
datefmt = %H:%M:%S
